name: sj Auto Training Daily

# 設定執行觸發條件
on:
  schedule:
    # 這裡使用 UTC 時間。台灣時間 (UTC+8) 早上 08:30
    # 等於 UTC 時間 00:30。
    # 語法：分 時 日 月 週 
    - cron: '40 0 * * 1-5'

  # 允許手動點擊執行 (方便測試)
  workflow_dispatch:
permissions:
  contents: read
jobs:
  training_job:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: Setup Python
        run: uv python install 3.12
      - name: Install dependencies
        run: |
          uv venv
          uv pip install "shioaji[speed]" pandas numpy requests dropbox
      - name: Run Shioaji Script
        env:
          SJ_API_KEY: ${{ secrets.SJ_API_KEY }}
          SJ_SECRET_KEY: ${{ secrets.SJ_SECRET_KEY }}
          SJ_CERT_BASE64: ${{ secrets.SJ_CERT_BASE64 }}
          SJ_CERT_PASSWORD: ${{ secrets.SJ_CERT_PASSWORD }}
          SJ_ID: ${{ secrets.SJ_ID }}
          SJ_PASSWORD: ${{ secrets.SJ_PASSWORD }}
          APP_PWD: ${{ secrets.APP_PWD }}
          DBX_K: ${{ secrets.DBX_K }}
          DBX_REFRESH: ${{ secrets.DBX_REFRESH }}
          DBX_SCRT: ${{ secrets.DBX_SCRT }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER: ${{ secrets.USER }}
          USER2: ${{ secrets.USER2 }}
        run: uv run python trainmodel.py
